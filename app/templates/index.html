<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia Facial</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="glass-panel header">
            <div class="logo">
                <span class="icon">📷</span>
                <h1>Asistencia Inteligente</h1>
            </div>
            <div class="actions">
                <button id="btn-open-enroll" class="btn primary">Registrar Nuevo Usuario</button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- CAMERA SECTION -->
            <section class="camera-section glass-panel">
                <h2>Cámara en Vivo</h2>
                <div class="video-container">
                    <video id="videoElement" autoplay playsinline></video>
                    <div class="scanner-overlay"></div>
                </div>
                <div class="status-bar" id="recognition-status">
                    Iniciando cámara...
                </div>
            </section>

            <!-- ATTENDANCE LOG SECTION -->
            <section class="log-section glass-panel">
                <h2>Asistencias de Hoy</h2>
                <div class="table-container">
                    <table id="attendance-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Hora</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-body">
                            <!-- Rows will be populated here by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- ENROLLMENT MODAL -->
    <div id="enroll-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Registrar Nuevo Usuario</h2>
            <button class="close-btn" id="btn-close-enroll">&times;</button>
            <form id="enroll-form">
                <div class="form-group">
                    <label for="enroll-name">Nombre del Empleado/Estudiante:</label>
                    <input type="text" id="enroll-name" name="name" required placeholder="Ej: Juan Perez">
                </div>
                <div class="form-group">
                    <label>Capturar Rostro:</label>
                    <div class="enroll-video-container">
                        <video id="enrollVideoElement" autoplay playsinline></video>
                    </div>
                    <button type="button" id="btn-capture" class="btn secondary">Capturar Foto</button>
                    <canvas id="enrollCanvas" style="display: none;"></canvas>
                    <img id="enroll-preview" style="display: none;" class="preview-img">
                </div>
                <!-- Hidden input to hold the image Blob -->
                <input type="hidden" id="enroll-image-data">
                
                <div class="form-actions">
                    <button type="submit" class="btn primary" id="btn-submit-enroll" disabled>Guardar Registro</button>
                </div>
                <div id="enroll-feedback" class="feedback"></div>
            </form>
        </div>
    </div>

    <!-- Hidden canvas for background frame extraction -->
    <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <script>
        // DOM Elements
        const video = document.getElementById('videoElement');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');
        const statusDiv = document.getElementById('recognition-status');
        const attendanceBody = document.getElementById('attendance-body');
        
        // Enrollment Elements
        const modal = document.getElementById('enroll-modal');
        const btnOpenEnroll = document.getElementById('btn-open-enroll');
        const btnCloseEnroll = document.getElementById('btn-close-enroll');
        const enrollVideo = document.getElementById('enrollVideoElement');
        const btnCapture = document.getElementById('btn-capture');
        const enrollCanvas = document.getElementById('enrollCanvas');
        const enrollCtx = enrollCanvas.getContext('2d');
        const enrollPreview = document.getElementById('enroll-preview');
        const enrollForm = document.getElementById('enroll-form');
        const btnSubmitEnroll = document.getElementById('btn-submit-enroll');
        const enrollFeedback = document.getElementById('enroll-feedback');
        
        let recognitionInterval = null;
        let capturedBlob = null;

        // Initialize Main Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                statusDiv.textContent = 'Cámara activa. Buscando rostros...';
                statusDiv.className = 'status-bar success';
                
                // Set canvas dimensions once video metadata loads
                video.onloadedmetadata = () => {
                    hiddenCanvas.width = video.videoWidth;
                    hiddenCanvas.height = video.videoHeight;
                    // Start the recognition loop (every 3 seconds)
                    recognitionInterval = setInterval(processFrame, 3000);
                };
            } catch (err) {
                console.error("Error accessing camera:", err);
                statusDiv.textContent = 'Error: No se pudo acceder a la cámara.';
                statusDiv.className = 'status-bar error';
            }
        }

        // Process a frame for recognition
        async function processFrame() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            // Draw current video frame to canvas
            ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            
            // Get base64 representation
            const base64Image = hiddenCanvas.toDataURL('image/jpeg', 0.8);

            try {
                const response = await fetch('/api/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    showTemporaryStatus(data.message, 'success');
                    updateAttendanceList();
                } else if (data.status === 'info') {
                    // Already logged recently, just blink info
                    showTemporaryStatus(data.message, 'info');
                }
            } catch (err) {
                console.error("Error connecting to recognition API:", err);
            }
        }

        // Refresh Attendance Table
        async function updateAttendanceList() {
            try {
                const response = await fetch('/api/asistencias');
                const data = await response.json();
                
                // Clear existing
                attendanceBody.replaceChildren();
                
                data.records.forEach(record => {
                    const tr = document.createElement('tr');
                    
                    const tdName = document.createElement('td');
                    tdName.textContent = record.name;
                    
                    const tdTime = document.createElement('td');
                    tdTime.textContent = record.time;
                    
                    tr.appendChild(tdName);
                    tr.appendChild(tdTime);
                    attendanceBody.appendChild(tr);
                });
            } catch (err) {
                console.error("Error fetching attendance list:", err);
            }
        }

        function showTemporaryStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status-bar ${type}`;
            setTimeout(() => {
                statusDiv.textContent = 'Cámara activa. Buscando rostros...';
                statusDiv.className = 'status-bar success';
            }, 3000);
        }

        // --- Enrollment Logic ---
        
        btnOpenEnroll.addEventListener('click', async () => {
            modal.classList.remove('hidden');
            // Try to share the stream or get a new one for the modal
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                enrollVideo.srcObject = stream;
            } catch(e) {
                enrollFeedback.textContent = "Error al acceder a la cámara.";
                enrollFeedback.className = "feedback error";
            }
        });

        btnCloseEnroll.addEventListener('click', () => {
            modal.classList.add('hidden');
            if (enrollVideo.srcObject) {
                enrollVideo.srcObject.getTracks().forEach(track => track.stop());
            }
            // Reset form
            enrollForm.reset();
            enrollPreview.style.display = 'none';
            enrollVideo.style.display = 'block';
            capturedBlob = null;
            btnSubmitEnroll.disabled = true;
            enrollFeedback.textContent = '';
        });

        btnCapture.addEventListener('click', () => {
            enrollCanvas.width = enrollVideo.videoWidth;
            enrollCanvas.height = enrollVideo.videoHeight;
            enrollCtx.drawImage(enrollVideo, 0, 0, enrollCanvas.width, enrollCanvas.height);
            
            // Show preview
            enrollPreview.src = enrollCanvas.toDataURL('image/jpeg', 0.9);
            enrollPreview.style.display = 'block';
            enrollVideo.style.display = 'none';
            
            // Convert to blob for upload
            enrollCanvas.toBlob(blob => {
                capturedBlob = blob;
                btnSubmitEnroll.disabled = false;
            }, 'image/jpeg', 0.9);
        });

        enrollForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!capturedBlob) return;
            
            const name = document.getElementById('enroll-name').value;
            const formData = new FormData();
            formData.append('name', name);
            formData.append('file', capturedBlob, 'photo.jpg');

            btnSubmitEnroll.disabled = true;
            btnSubmitEnroll.textContent = 'Guardando...';

            try {
                const response = await fetch('/api/enroll', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (response.ok) {
                    enrollFeedback.textContent = result.message;
                    enrollFeedback.className = "feedback success";
                    setTimeout(() => btnCloseEnroll.click(), 2000);
                } else {
                    enrollFeedback.textContent = result.detail || "Error al registrar.";
                    enrollFeedback.className = "feedback error";
                    btnSubmitEnroll.disabled = false;
                    btnSubmitEnroll.textContent = 'Guardar Registro';
                }
            } catch (err) {
                enrollFeedback.textContent = "Error de red.";
                enrollFeedback.className = "feedback error";
                btnSubmitEnroll.disabled = false;
                btnSubmitEnroll.textContent = 'Guardar Registro';
            }
        });

        // Start
        window.addEventListener('load', () => {
            initCamera();
            updateAttendanceList();
            // Polling attendance every 10 seconds to keep it fresh
            setInterval(updateAttendanceList, 10000);
        });

    </script>
</body>
</html>
